name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install lightweight analysis dependencies
        run: python -m pip install -r analysis/requirements.txt

      - name: Backend integration tests
        run: python backend/test_backend.py

      - name: TTN decoder tests
        run: node decoder/test_decoder.js

      - name: Firmware host contracts + decision scenario invariants
        working-directory: test/decision_sim
        run: |
          python -m unittest discover -p "test*.py" -v
          python scenario_sim.py

      - name: ML pipeline contract tests
        working-directory: ml
        run: python -m unittest discover -s tests -v

      - name: Statistical contract tests
        working-directory: analysis
        run: python -m unittest discover -s tests -v

      - name: Compile-check every Python script (no heavy deps needed)
        run: |
          python -m py_compile ml/*.py analysis/*.py backend/*.py \
            ml/tests/*.py analysis/tests/*.py test/decision_sim/*.py \
            test/ground_truth_logger.py
