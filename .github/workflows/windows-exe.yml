# Packages backend/server.py + the dashboard into a single BananaGuard.exe
# (PyInstaller onefile). Double-click on any Windows laptop -> local
# dashboard + TTN webhook listener on port 8000; the SQLite DB is created
# next to the .exe. Artifact on every run; attached to the GitHub Release
# on v* tags.
name: Build Windows exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - backend/**
      - index.html
      - support.js
      - Ring.dc.html
      - LICENSE
      - vendor/**
      - assets/**
      - packaging/windows/**
      - .github/workflows/windows-exe.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Run backend tests first
        run: python backend/test_backend.py

      - name: Install PyInstaller
        run: python -m pip install pyinstaller==6.21.0

      - name: Record Windows runtime and build-tool notices
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path windows-notices -Force | Out-Null
          $pythonRoot = Split-Path -Parent (Get-Command python).Source
          Copy-Item -LiteralPath (Join-Path $pythonRoot 'LICENSE.txt') -Destination windows-notices/PYTHON-LICENSE.txt
          python -c "import importlib.metadata as m, pathlib, shutil; d=m.distribution('pyinstaller'); f=next(x for x in (d.files or []) if str(x).replace('\\','/').endswith('/licenses/COPYING.txt')); shutil.copyfile(d.locate_file(f), pathlib.Path('windows-notices/PYINSTALLER-COPYING.txt'))"
          python -m pip list --format=freeze | Out-File -Encoding utf8NoBOM windows-notices/PYTHON-BUILD-INVENTORY.txt
          Copy-Item -LiteralPath packaging/windows/README.md -Destination windows-notices/PACKAGING-README.md
          python -c "import PyInstaller; assert PyInstaller.__version__ == '6.21.0', PyInstaller.__version__"
          Get-ChildItem windows-notices | ForEach-Object { if ($_.Length -eq 0) { throw "$($_.Name) is empty" } }

      - name: Build single-file exe (server + dashboard bundled)
        shell: pwsh
        run: |
          $bundleArgs = @(
            '--onefile', '--name', 'BananaGuard',
            '--add-data', 'index.html;.',
            '--add-data', 'support.js;.',
            '--add-data', 'Ring.dc.html;.',
            '--add-data', 'LICENSE;.',
            '--add-data', 'vendor;vendor'
          )
          if (Test-Path -LiteralPath assets) {
            $bundleArgs += @('--add-data', 'assets;assets')
          }
          $bundleArgs += 'backend/server.py'
          pyinstaller @bundleArgs

      - name: Smoke test the exe
        shell: pwsh
        run: |
          $p = Start-Process -FilePath dist/BananaGuard.exe `
            -ArgumentList '--port','8123','--db','smoke.db' -PassThru `
            -RedirectStandardOutput server.out.log -RedirectStandardError server.err.log
          Start-Sleep -Seconds 8
          $failed = $false
          try {
            foreach ($u in '/api/health','/index.html','/LICENSE','/vendor/LICENSES.txt','/vendor/react.production.min.js','/vendor/react-dom.production.min.js','/vendor/fonts/fonts.css','/vendor/fonts/manrope-latin.woff2','/vendor/fonts/space-grotesk-latin.woff2','/vendor/fonts/material-symbols-rounded.woff2','/vendor/fonts/LICENSES.txt') {
              $r = Invoke-WebRequest "http://localhost:8123$u" -UseBasicParsing
              Write-Host "$u -> $($r.StatusCode) ($($r.RawContentLength) bytes)"
              if ($r.StatusCode -ne 200) { $failed = $true }
            }
          } catch {
            Write-Host "request failed: $_"
            $failed = $true
          } finally {
            Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          }
          Write-Host "--- server stdout ---"; Get-Content server.out.log -ErrorAction SilentlyContinue
          Write-Host "--- server stderr ---"; Get-Content server.err.log -ErrorAction SilentlyContinue
          if ($failed) { Write-Error "smoke test failed"; exit 1 }
          Write-Host "exe serves API + dashboard OK"

      - name: Prepare Windows distribution
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-windows -Force | Out-Null
          Copy-Item -LiteralPath dist/BananaGuard.exe -Destination release-windows/BananaGuard.exe
          Copy-Item -Path windows-notices/*.txt -Destination release-windows/
          Copy-Item -LiteralPath windows-notices/PACKAGING-README.md -Destination release-windows/

      - uses: actions/upload-artifact@v4
        with:
          name: BananaGuard-windows
          path: release-windows/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: exe
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: BananaGuard-windows
          path: dist
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
