# Wraps the dashboard in a Capacitor WebView shell and builds a
# debug-signed APK (sideload-ready for field phones; no Play signing).
# Inside the APK there is no same-origin backend, so the app remains Demo-only
# until an authenticated HTTPS mobile deployment path exists. Selecting Actual
# shows setup/error state and never falls back to synthetic telemetry.
# Artifact on every run; attached to the GitHub Release on v* tags.
name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - index.html
      - support.js
      - Ring.dc.html
      - LICENSE
      - vendor/**
      - assets/**
      - appshell/**
      - .github/workflows/android-apk.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Assemble web assets
        run: |
          mkdir -p appshell/www
          cp index.html support.js Ring.dc.html appshell/www/
          cp LICENSE appshell/www/LICENSE
          cp -r vendor appshell/www/vendor
          cp appshell/THIRD_PARTY_NOTICES.txt appshell/www/THIRD_PARTY_NOTICES.txt
          if [ -d assets ]; then cp -r assets appshell/www/assets; fi
          test -s appshell/www/vendor/fonts/fonts.css
          test -s appshell/www/vendor/fonts/manrope-latin.woff2
          test -s appshell/www/vendor/fonts/space-grotesk-latin.woff2
          test -s appshell/www/vendor/fonts/material-symbols-rounded.woff2
          test -s appshell/www/LICENSE
          test -s appshell/www/vendor/LICENSES.txt
          test -s appshell/www/vendor/fonts/LICENSES.txt
          test -s appshell/www/THIRD_PARTY_NOTICES.txt

      - name: Generate Capacitor Android shell
        working-directory: appshell
        run: |
          npm ci --ignore-scripts
          node -e "const lock=require('./package-lock.json'); for (const p of ['@capacitor/core','@capacitor/cli','@capacitor/android']) { const v=lock.packages['node_modules/'+p].version; if (v !== '7.6.7') throw new Error(p + ' resolved to ' + v); }"
          npx cap init BananaGuard com.bananaguard.dashboard --web-dir=www
          npx cap add android
          ./android/gradlew -p android app:dependencies --configuration debugRuntimeClasspath > www/ANDROID-DEPENDENCIES.txt
          test -s www/ANDROID-DEPENDENCIES.txt
          npx cap copy android

      - name: Build debug APK
        working-directory: appshell/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename artifact
        run: |
          cp appshell/android/app/build/outputs/apk/debug/app-debug.apk BananaGuard-debug.apk
          unzip -l BananaGuard-debug.apk | grep -F 'assets/public/LICENSE'
          unzip -l BananaGuard-debug.apk | grep -F 'assets/public/vendor/LICENSES.txt'
          unzip -l BananaGuard-debug.apk | grep -F 'assets/public/vendor/fonts/LICENSES.txt'
          unzip -p BananaGuard-debug.apk assets/public/THIRD_PARTY_NOTICES.txt | grep -F 'Copyright (c) 2017-present Drifty Co.'
          unzip -p BananaGuard-debug.apk assets/public/ANDROID-DEPENDENCIES.txt | grep -F 'debugRuntimeClasspath'

      - uses: actions/upload-artifact@v4
        with:
          name: BananaGuard-android
          path: BananaGuard-debug.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: BananaGuard-android
          path: dist
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BananaGuard-debug.apk
