# Publishes the dashboard to GitHub Pages. One-time repo setup:
# Settings -> Pages -> Source: "GitHub Actions".
# On Pages there is no backend, so the dashboard defaults explicitly to Demo.
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - index.html
      - support.js
      - Ring.dc.html
      - LICENSE
      - vendor/**
      - assets/**
      - tools/build_standalone.py
      - tools/check_standalone.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and verify downloadable standalone
        run: |
          python tools/build_standalone.py
          python tools/check_standalone.py
      - name: Assemble static site (dashboard files only)
        run: |
          mkdir _site
          cp index.html support.js Ring.dc.html _site/
          cp LICENSE _site/LICENSE
          cp -r vendor _site/vendor
          if [ -d assets ]; then cp -r assets _site/assets; fi
          cp dist/BananaGuard-Standalone.html _site/
          test -s _site/vendor/fonts/fonts.css
          test -s _site/vendor/fonts/manrope-latin.woff2
          test -s _site/vendor/fonts/space-grotesk-latin.woff2
          test -s _site/vendor/fonts/material-symbols-rounded.woff2
          test -s _site/LICENSE
          test -s _site/vendor/LICENSES.txt
          test -s _site/vendor/fonts/LICENSES.txt
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
